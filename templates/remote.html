<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Mouse</title>
    <style>
        body { margin:0; background:#1e1e1e; color:white; font-family:Arial; display:flex; flex-direction:column; height:100vh; }
        header { text-align:center; padding:15px; background:#111; font-size:20px; }
        #touchpad { flex:1; background:#2e2e2e; margin:10px; border-radius:15px; touch-action:none; }
        .buttons { display:flex; gap:10px; padding:10px; }
        button { flex:1; padding:15px; font-size:16px; border:none; border-radius:10px; background:#4CAF50; color:white; }
        input { margin:10px; padding:10px; border-radius:10px; border:none; font-size:16px; }
    </style>
</head>

<body>

<header>🖱 Remote Mouse Controller</header>

<div id="touchpad"></div>

<div class="buttons">
    <button onclick="leftClick()">Left Click</button>
    <button onclick="rightClick()">Right Click</button>
</div>

<input id="keyboard" placeholder="Type here..." autofocus>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const socket = io();

const touchpad = document.getElementById("touchpad");
const keyboard = document.getElementById("keyboard");

let lastX = 0;
let lastY = 0;

// ------------------ TOUCHPAD ------------------
touchpad.addEventListener("touchstart", e => {
    const touch = e.touches[0];
    lastX = touch.clientX;
    lastY = touch.clientY;
});

touchpad.addEventListener("touchmove", e => {
    e.preventDefault();
    const touch = e.touches[0];
    let dx = touch.clientX - lastX;
    let dy = touch.clientY - lastY;
    socket.emit("move_cursor", { dx: dx, dy: dy });
    lastX = touch.clientX;
    lastY = touch.clientY;
});

// ------------------ BUTTONS ------------------
function leftClick() { socket.emit("click", { button: "left" }); }
function rightClick() { socket.emit("click", { button: "right" }); }

// ------------------ KEYBOARD ------------------
keyboard.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") {
        socket.emit("type_text", { key: "backspace" });
    } else if (e.key.length === 1) {
        socket.emit("type_text", { key: e.key });
    }
    e.preventDefault(); // prevent typing in the input itself
});
</script>

</body>
</html>
